services:
  - type: web
    name: dukudukuapp
    runtime: node
    repo: https://github.com/sakhamnima/DukuDukuApp
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: ALLOW_DEV_LOGIN
        value: "true"
      - key: PI_API_BASE
        value: https://api.minepi.com
